<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Playwright Login Testing Demo</title>
  <meta name="description" content="A feature-rich, high-performance login page demo configured for comprehensive Playwright E2E testing.">
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/src/style.css">
</head>
<body>
  <!-- Theme Toggle Floating Button -->
  <button id="theme-toggle" class="theme-toggle" aria-label="Toggle light/dark theme">
    <!-- Sun Icon (shown in dark mode) -->
    <svg class="icon sun-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="4"></circle>
      <path d="M12 2v2"></path>
      <path d="M12 20v2"></path>
      <path d="m4.93 4.93 1.41 1.41"></path>
      <path d="m17.66 17.66 1.41 1.41"></path>
      <path d="M2 12h2"></path>
      <path d="M20 12h2"></path>
      <path d="m6.34 17.66-1.41 1.41"></path>
      <path d="m19.07 4.93-1.41 1.41"></path>
    </svg>
    <!-- Moon Icon (shown in light mode) -->
    <svg class="icon moon-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"></path>
    </svg>
  </button>

  <!-- Main Container -->
  <main class="container">
    <div class="login-card">
      <header class="card-header">
        <div class="logo">
          <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="url(#logo-grad)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <defs>
              <linearGradient id="logo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="var(--primary-light)"/>
                <stop offset="100%" stop-color="var(--primary)"/>
              </linearGradient>
            </defs>
            <path d="M15 6v12a3 3 0 1 0 3-3H6a3 3 0 1 0 3 3V6a3 3 0 1 0-3 3h12a3 3 0 1 0-3-3z"></path>
          </svg>
        </div>
        <h1 class="heading">Welcome to <span class="mounisha-highlight">Mounisha's</span> PlayWright Testing Demo</h1>
        <p class="subheading">Sign in to your account to continue testing.</p>
      </header>

      <form id="login-form" novalidate>
        <!-- Email Input -->
        <div class="input-group">
          <label for="email-input" class="input-label">Email Address</label>
          <div class="input-wrapper">
            <input type="email" id="email-input" class="form-input" placeholder="name@example.com" required autocomplete="email">
            <span class="input-icon">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"></rect><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"></path></svg>
            </span>
          </div>
          <span id="email-error" class="error-msg" aria-live="polite"></span>
        </div>

        <!-- Password Input -->
        <div class="input-group">
          <div class="label-wrapper">
            <label for="password-input" class="input-label">Password</label>
          </div>
          <div class="input-wrapper">
            <input type="password" id="password-input" class="form-input" placeholder="••••••••" required autocomplete="current-password">
            <span class="input-icon">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
            </span>
            <button type="button" id="password-toggle" class="password-toggle-btn" aria-label="Show password">
              <!-- Eye open icon -->
              <svg class="icon eye-open" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
              <!-- Eye closed icon -->
              <svg class="icon eye-closed hidden" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"></path>
                <path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"></path>
                <path d="M6.61 6.61A13.52 13.52 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"></path>
                <line x1="2" x2="22" y1="2" y2="22"></line>
              </svg>
            </button>
          </div>
          <span id="password-error" class="error-msg" aria-live="polite"></span>

          <!-- Password Strength Indicator -->
          <div class="strength-container">
            <div id="strength-meter" class="strength-meter">
              <div class="strength-bar"></div>
            </div>
            <div class="strength-label-row">
              <span class="strength-caption">Password Strength:</span>
              <span id="strength-label" class="strength-label-text" data-strength="none">Empty</span>
            </div>
          </div>
        </div>

        <!-- Remember Me & Forgot Password -->
        <div class="options-row">
          <label class="checkbox-container">
            <input type="checkbox" id="remember-me">
            <span class="checkbox-checkmark"></span>
            <span class="checkbox-label">Remember Me</span>
          </label>
          <a href="#" id="forgot-password" class="forgot-link">Forgot Password?</a>
        </div>

        <!-- Submit Button -->
        <button type="submit" id="submit-btn" class="submit-btn">
          <span class="btn-text">Sign In</span>
          <svg class="spinner hidden" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg>
        </button>
      </form>


      <!-- Sign Up Navigation Link -->
      <div class="divider">
        <span>New to testing?</span>
      </div>
      <div style="text-align: center;">
        <a href="/signup.html" class="forgot-link">Create an Account</a>
      </div>
    </div>
  </main>

  <!-- Toast Notification Container -->
  <div id="toast-container" class="toast-container" role="alert" aria-live="assertive"></div>

  <!-- Main JavaScript File -->
  <script type="module" src="/src/main.js"></script>
</body>
</html>
